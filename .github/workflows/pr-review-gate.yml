# Reminds maintainers that AI review must complete before merge.
# Actual reviews come from the CodeRabbit GitHub App (.coderabbit.yaml).
name: PR review gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  review-reminder:
    name: PR review policy
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Post review checklist
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-review-gate -->';
            const body = `${marker}
            ### Review before merge

            - [ ] **CodeRabbit** finished reviewing this PR ([install app](https://github.com/apps/coderabbitai) if missing)
            - [ ] Feedback addressed or replied to; **all conversations resolved**
            - [ ] CI / local checks pass ([docs/PR_REVIEW.md](https://github.com/${{ github.repository }}/blob/main/docs/PR_REVIEW.md))

            Comment \`@coderabbitai review\` to re-run.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
