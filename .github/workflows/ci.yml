name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Lint
        run: npm run lint

      - name: Mutating routes Zod gate
        run: npm run audit:mutating-zod

      - name: Tenant scope P0 gate
        run: npm run audit:tenant-scope:p0

      - name: Generate OpenAPI spec
        run: npm run openapi:generate

      - name: Unit tests
        run: npm run test:ci
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          CRON_SECRET: ci-placeholder-cron-secret

      - name: Typecheck
        run: npx tsc --noEmit
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXTAUTH_SECRET: ci-placeholder-secret-for-build-only-min-32-chars!!
          NEXTAUTH_URL: http://localhost:3000

  prisma-migrate:
    name: Prisma migrate check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      - name: Validate migration history
        run: npx prisma migrate diff --from-migrations prisma/migrations --to-schema-datamodel prisma/schema.prisma --exit-code
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

  api-audit:
    name: API route audit freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run audit:api-routes:check
      - run: npm run audit:grandfather-shrink
      - run: npm run audit:route-line-limit

  e2e-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXTAUTH_SECRET: ci-placeholder-secret-for-build-only-min-32-chars!!
          NEXTAUTH_URL: http://localhost:3000
      - name: E2E smoke
        run: npm run test:e2e:smoke
        env:
          CI: "true"
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXTAUTH_SECRET: ci-placeholder-secret-for-build-only-min-32-chars!!
          NEXTAUTH_URL: http://localhost:3000
