name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Lint
        run: npm run lint

      - name: Mutating routes Zod gate
        run: npm run audit:mutating-zod

      - name: Tenant scope P0 gate
        run: npm run audit:tenant-scope:p0

      - name: Generate OpenAPI spec
        run: npm run openapi:generate

      - name: OpenAPI freshness
        run: npm run openapi:check

      - name: Unit tests
        run: npm run test:ci
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          CRON_SECRET: ci-placeholder-cron-secret

      - name: Typecheck
        run: npx tsc --noEmit
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXTAUTH_SECRET: ci-placeholder-secret-for-build-only-min-32-chars!!
          NEXTAUTH_URL: http://localhost:3000

  prisma-migrate:
    name: Prisma migrate check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymkhana_ci
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymkhana_ci
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gymkhana_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymkhana_ci
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymkhana_ci
      - name: Apply migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymkhana_ci
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymkhana_ci
      - name: Validate Prisma schema
        run: npx prisma validate

  api-audit:
    name: API route audit freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run audit:api-routes:check
      - run: npm run audit:grandfather-shrink
      - run: npm run audit:route-line-limit

  e2e-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymkhana_ci
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymkhana_ci
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gymkhana_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymkhana_ci
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymkhana_ci
      - name: Apply migrations and seed E2E user
        run: |
          npx prisma migrate deploy
          npm run db:seed-demo-gym
          npm run db:seed-e2e-user
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymkhana_ci
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymkhana_ci
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymkhana_ci
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymkhana_ci
          NEXTAUTH_SECRET: ci-placeholder-secret-for-build-only-min-32-chars!!
          NEXTAUTH_URL: http://localhost:3000
          CRON_SECRET: ci-placeholder-cron-secret-min-32-chars!!
          QR_SECRET: ci-placeholder-qr-secret-min-32-chars!!!!!!
      - name: E2E smoke
        run: npm run test:e2e:smoke
        env:
          CI: "true"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymkhana_ci
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymkhana_ci
          NEXTAUTH_SECRET: ci-placeholder-secret-for-build-only-min-32-chars!!
          NEXTAUTH_URL: http://localhost:3000
          CRON_SECRET: ci-placeholder-cron-secret-min-32-chars!!
          QR_SECRET: ci-placeholder-qr-secret-min-32-chars!!!!!!
          ALLOW_DEMO_ACCOUNT_AUTO_LINK: "false"